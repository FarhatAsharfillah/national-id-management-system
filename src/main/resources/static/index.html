<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen KTP</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }

        /* Form Styles */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .btn-submit { background-color: #28a745; }
        .btn-reset { background-color: #6c757d; }
        .btn-edit { background-color: #ffc107; color: black; padding: 5px 10px; }
        .btn-delete { background-color: #dc3545; padding: 5px 10px; }

        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007bff; color: white; }

        /* Notification Box */
        #notification { padding: 15px; margin-bottom: 20px; display: none; border-radius: 4px; font-weight: bold; text-align: center; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Manajemen Data KTP</h2>

    <div id="notification"></div>

    <form id="ktpForm">
        <input type="hidden" id="ktpId">

        <div class="form-group">
            <label for="nomorKtp">Nomor KTP</label>
            <input type="text" id="nomorKtp" required placeholder="Masukkan Nomor KTP">
        </div>
        <div class="form-group">
            <label for="namaLengkap">Nama Lengkap</label>
            <input type="text" id="namaLengkap" required placeholder="Masukkan Nama Lengkap">
        </div>
        <div class="form-group">
            <label for="alamat">Alamat</label>
            <input type="text" id="alamat" required placeholder="Masukkan Alamat">
        </div>
        <div class="form-group">
            <label for="tanggalLahir">Tanggal Lahir</label>
            <input type="date" id="tanggalLahir" required>
        </div>
        <div class="form-group">
            <label for="jenisKelamin">Jenis Kelamin</label>
            <select id="jenisKelamin" required>
                <option value="">-- Pilih Jenis Kelamin --</option>
                <option value="Laki-laki">Laki-laki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit">Simpan Data</button>
        <button type="button" class="btn-reset" onclick="resetForm()">Batal / Reset</button>
    </form>

    <hr>

    <table>
        <thead>
        <tr>
            <th>No KTP</th>
            <th>Nama Lengkap</th>
            <th>Alamat</th>
            <th>Tanggal Lahir</th>
            <th>Jenis Kelamin</th>
            <th>Aksi</th>
        </tr>
        </thead>
        <tbody id="ktpTableBody">
        </tbody>
    </table>
</div>

<script>
    const API_URL = "http://localhost:8080/ktp";

    // Dijalankan pertama kali saat halaman di-load
    $(document).ready(function () {
        loadData();

        // Menangani aksi Submit Form (Tambah atau Update)
        $('#ktpForm').submit(function (e) {
            e.preventDefault(); // Mencegah halaman refresh
            saveData();
        });
    });

    // 1. GET: Menampilkan semua data
    function loadData() {
        $.ajax({
            url: API_URL,
            type: "GET",
            success: function (response) {
                let tbody = $('#ktpTableBody');
                tbody.empty();

                if (response.data && response.data.length > 0) {
                    response.data.forEach(ktp => {
                        let row = `<tr>
                            <td>${ktp.nomorKtp}</td>
                            <td>${ktp.namaLengkap}</td>
                            <td>${ktp.alamat}</td>
                            <td>${ktp.tanggalLahir}</td>
                            <td>${ktp.jenisKelamin}</td>
                            <td>
                                <button class="btn-edit" onclick="editData(${ktp.id})">Edit</button>
                                <button class="btn-delete" onclick="deleteData(${ktp.id})">Hapus</button>
                            </td>
                        </tr>`;
                        tbody.append(row);
                    });
                } else {
                    tbody.append('<tr><td colspan="6" style="text-align:center;">Belum ada data KTP</td></tr>');
                }
            },
            error: function () {
                showNotification("Gagal mengambil data dari server!", "error");
            }
        });
    }

    // 2. POST & PUT: Menyimpan atau Memperbarui data
    function saveData() {
        let id = $('#ktpId').val();

        let payload = {
            nomorKtp: $('#nomorKtp').val(),
            namaLengkap: $('#namaLengkap').val(),
            alamat: $('#alamat').val(),
            tanggalLahir: $('#tanggalLahir').val(),
            jenisKelamin: $('#jenisKelamin').val()
        };

        // Jika ID kosong, berarti POST (Tambah Baru). Jika ada ID, berarti PUT (Update).
        let typeMethod = id ? "PUT" : "POST";
        let targetUrl = id ? `${API_URL}/${id}` : API_URL;

        $.ajax({
            url: targetUrl,
            type: typeMethod,
            contentType: "application/json",
            data: JSON.stringify(payload),
            success: function (response) {
                showNotification(`Data berhasil ${id ? 'diperbarui' : 'ditambahkan'}!`, "success");
                resetForm();
                loadData(); // Memuat ulang tabel tanpa refresh halaman
            },
            error: function (xhr) {
                let errorMsg = xhr.responseJSON ? xhr.responseJSON.message : "Terjadi kesalahan saat menyimpan data";
                showNotification(errorMsg, "error");
            }
        });
    }

    // 3. Menyiapkan form untuk operasi PUT (Edit)
    function editData(id) {
        $.ajax({
            url: `${API_URL}/${id}`,
            type: "GET",
            success: function (response) {
                let ktp = response.data;
                // Memasukkan data ke dalam form
                $('#ktpId').val(ktp.id);
                $('#nomorKtp').val(ktp.nomorKtp);
                $('#namaLengkap').val(ktp.namaLengkap);
                $('#alamat').val(ktp.alamat);
                $('#tanggalLahir').val(ktp.tanggalLahir);
                $('#jenisKelamin').val(ktp.jenisKelamin);

                // Ubah teks tombol
                $('#btnSubmit').text("Update Data").removeClass('btn-submit').css('background-color', '#ffc107').css('color', 'black');
                window.scrollTo(0, 0); // Scroll ke atas menuju form
            },
            error: function () {
                showNotification("Gagal mengambil data KTP untuk diedit!", "error");
            }
        });
    }

    // 4. DELETE: Menghapus data berdasarkan ID
    function deleteData(id) {
        if (confirm("Apakah Anda yakin ingin menghapus data KTP ini?")) {
            $.ajax({
                url: `${API_URL}/${id}`,
                type: "DELETE",
                success: function (response) {
                    showNotification("Data KTP berhasil dihapus!", "success");
                    loadData(); // Memuat ulang tabel setelah hapus
                },
                error: function () {
                    showNotification("Gagal menghapus data KTP!", "error");
                }
            });
        }
    }

    // Fungsi utilitas untuk reset form
    function resetForm() {
        $('#ktpId').val("");
        $('#ktpForm')[0].reset();
        $('#btnSubmit').text("Simpan Data").addClass('btn-submit').css('background-color', '#28a745').css('color', 'white');
    }

    // Fungsi utilitas untuk menampilkan notifikasi
    function showNotification(message, type) {
        let notifBox = $('#notification');
        notifBox.text(message)
                .removeClass("success error")
                .addClass(type)
                .fadeIn();

        // Hilangkan notifikasi setelah 3 detik
        setTimeout(() => {
            notifBox.fadeOut();
        }, 3000);
    }
</script>

</body>
</html>
